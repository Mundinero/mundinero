<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundinero — Próximamente</title>
  <link rel="icon" type="image/jpeg" href="/mundineronav.jpg">
  <link rel="apple-touch-icon" href="/mundineronav.jpg">
  <meta name="description" content="El futuro del dinero habla. Nosotros traducimos. Lanzamiento 8 de junio 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tinta:     #1f1e1d;
      --crema:     #F7F6F3;
      --azul:      #6B87FF;
      --azul-vivo: #5170ff;
      --verde:     #34D87F;
      --rojo:      #FF6B6B;
      --serif:     'Newsreader', Georgia, serif;
      --sans:      'IBM Plex Sans', system-ui, sans-serif;
      --mono:      'IBM Plex Mono', ui-monospace, monospace;
    }

    html, body {
      height: 100%;
      background: var(--tinta);
      color: var(--crema);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 300;
    }

    /* ── WALLPAPER ── */
    .bg-wall {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .wall-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 50%;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }
    .wall-slide.active { opacity: 1; }
    .wall-overlay-top {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(31,30,29,0.75) 0%,
        rgba(31,30,29,0.0)  25%
      );
    }
    .wall-overlay-bottom {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(31,30,29,0.92) 0%,
        rgba(31,30,29,0.7)  30%,
        rgba(31,30,29,0.0)  60%
      );
    }
    .wall-overlay-center {
      position: absolute;
      inset: 0;
      background: rgba(31,30,29,0.28);
    }

    /* ── PHOTO CREDIT (in footer) ── */
    #photo-credit b { color: rgba(247,246,243,0.65); font-weight: 600; }

    /* ── TICKER — Liquid Glass ── */
    .ticker {
      position: fixed;
      top: 10px;
      left: 14px;
      right: 14px;
      height: 36px;
      border-radius: 999px;

      background: rgba(10,10,12,0.45);
      backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
      -webkit-backdrop-filter: blur(28px) saturate(200%) brightness(1.05);
      background-clip: padding-box;

      border: 1px solid transparent;
      box-shadow:
        0 2px 32px rgba(0,0,0,0.4),
        0 1px 0 rgba(255,255,255,0.12) inset,
        0 -1px 0 rgba(0,0,0,0.25) inset,
        0 0 0 0.5px rgba(255,255,255,0.08);

      filter: url(#liquid-glass);
      overflow: hidden;
      display: flex;
      align-items: center;
      z-index: 100;
    }
    /* Borde iridiscente */
    .ticker::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 999px;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.25) 0%,
        rgba(255,255,255,0.05) 30%,
        rgba(107,135,255,0.15) 60%,
        rgba(52,216,127,0.10) 80%,
        rgba(255,255,255,0.20) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box,
                    linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    /* Reflejo de luz superior */
    .ticker::after {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.35) 30%,
        rgba(255,255,255,0.50) 50%,
        rgba(255,255,255,0.35) 70%,
        transparent 100%
      );
      border-radius: 999px;
      pointer-events: none;
    }
    .ticker-inner {
      overflow: hidden;
      flex: 1;
      position: relative;
      z-index: 1;
    }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: scroll-ticker 45s linear infinite;
      position: relative;
      z-index: 1;
    }
    .ti {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11.5px;
      font-family: var(--mono);
      font-weight: 500;
      padding: 0 20px;
      letter-spacing: 0.03em;
      color: rgba(247,246,243,0.75);
    }
    .ti .asset { color: rgba(247,246,243,0.45); }
    .ti .val   { color: rgba(247,246,243,0.9); font-weight: 600; }
    .ti .chg   { font-size: 11.5px; }
    .ti .up    { color: var(--verde); }
    .ti .dn    { color: var(--rojo); }
    .ti .note  { color: var(--verde); font-size: 11.5px; }
    @keyframes scroll-ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 80px;
      overflow: hidden;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px 40px 20px;
      min-height: 0;
    }

    /* ── LOGO ── */
    .logo-area {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
      width: 100%;
      margin-top: 16px;
      gap: 28px;
    }
    /* ── BRAND SEAL ── */
    .brand-seal {
      position: relative;
      width: clamp(220px, 32vw, 400px);
      height: clamp(220px, 32vw, 400px);
      flex-shrink: 0;
    }
    .brand-seal img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    @keyframes spin-cw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }
    @keyframes seal-glow {
      0%, 100% {
        filter: drop-shadow(0 0 16px rgba(247,246,243,0.20))
                drop-shadow(0 0 44px rgba(247,246,243,0.09));
      }
      50% {
        filter: drop-shadow(0 0 36px rgba(247,246,243,0.42))
                drop-shadow(0 0 80px rgba(247,246,243,0.18))
                drop-shadow(0 0 130px rgba(107,135,255,0.14));
      }
    }
    .seal-center { animation: seal-glow 5s ease-in-out infinite; }
    .seal-ring-3 { opacity: 0.80; animation: spin-ccw 22s linear infinite; }
    .seal-ring-4 { opacity: 0.68; animation: spin-cw 38s linear infinite; }

    @keyframes logo-pulse {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(247,246,243,0.14))
                drop-shadow(0 0 48px rgba(247,246,243,0.06));
      }
      50% {
        filter: drop-shadow(0 0 44px rgba(247,246,243,0.34))
                drop-shadow(0 0 90px rgba(247,246,243,0.16))
                drop-shadow(0 0 150px rgba(107,135,255,0.10));
      }
    }
    .logo-full {
      width: 100%;
      max-width: clamp(100px, 14vw, 180px);
      height: auto;
      display: block;
      animation: logo-pulse 5s ease-in-out infinite;
    }

    /* ── BOTTOM ── */
    .bottom {
      padding: 0 24px 68px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Launch date */
    .launch-date {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--crema);
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      gap: 2px;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 88px;
      padding: 12px 20px;
      background: rgba(31,30,29,0.45);
      border: 0.5px solid rgba(247,246,243,0.1);
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }
    .cd-num {
      font-family: var(--serif);
      font-size: clamp(36px, 4.5vw, 60px);
      font-weight: 700;
      line-height: 1;
      color: var(--crema);
      letter-spacing: -0.03em;
      transition: color 0.15s;
      text-shadow:
        0 0 26px rgba(247,246,243,0.26),
        0 0 52px rgba(107,135,255,0.13),
        0 0 84px rgba(107,135,255,0.06);
    }
    .cd-block:hover .cd-num { color: var(--azul); }
    .cd-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
      margin-top: 4px;
    }
    .cd-sep {
      display: flex;
      align-items: center;
      padding: 0 1px;
      padding-bottom: 18px;
      font-family: var(--serif);
      font-size: 26px;
      color: rgba(247,246,243,0.12);
    }

    /* ── STATUS ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-text {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
    }
    .status-dots {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    @keyframes dot-pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.75); }
      40%           { opacity: 1;    transform: scale(1); }
    }
    .status-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--azul);
      animation: dot-pulse 1.4s ease-in-out infinite;
    }
    .status-dot:nth-child(2) { animation-delay: 0.2s; }
    .status-dot:nth-child(3) { animation-delay: 0.4s; }

    /* ── NEWSLETTER ── */
    .newsletter { width: 100%; max-width: 400px; }
    .nl-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
      text-align: center;
      margin-bottom: 9px;
    }
    .nl-form {
      display: flex;
      border: 1px solid rgba(247,246,243,0.11);
      border-radius: 7px;
      overflow: hidden;
      background: rgba(31,30,29,0.4);
      backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }
    .nl-form:focus-within { border-color: rgba(107,135,255,0.5); }
    .nl-input {
      flex: 1;
      padding: 11px 14px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--crema);
      font-family: var(--sans);
      font-size: 13px;
    }
    .nl-input::placeholder { color: rgba(247,246,243,0.22); }
    .nl-btn {
      padding: 11px 16px;
      background: var(--azul-vivo);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .nl-btn:hover { background: #3a57e8; }
    .nl-btn.done  { background: var(--verde); cursor: default; }
    .nl-note {
      font-size: 10px;
      color: rgba(247,246,243,0.18);
      text-align: center;
      margin-top: 7px;
      letter-spacing: 0.02em;
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 11px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(247,246,243,0.05);
      background: rgba(31,30,29,0.88);
      backdrop-filter: blur(12px);
      z-index: 50;
    }
    .footer-by {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(247,246,243,0.28);
    }
    .footer-contact { display: flex; align-items: center; gap: 14px; }
    .footer-contact-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
    }
    .footer-icon-link {
      display: flex;
      align-items: center;
      color: rgba(247,246,243,0.28);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-icon-link:hover { color: var(--azul); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .logo-area { padding: 0 12px; gap: 14px; margin-top: 24px; }
      .brand-seal { width: clamp(200px, 62vw, 300px); height: clamp(200px, 62vw, 300px); }
      .logo-full { max-width: clamp(80px, 28vw, 140px); height: auto; }
      .tagline-center { font-size: 15px; padding: 0 20px; }
      .cd-num { font-size: 36px; }
      .cd-block { min-width: 60px; padding: 12px 8px 10px; }
      .cd-sep { font-size: 20px; }
      .newsletter { margin: 0 16px; width: calc(100% - 32px); }
    }
  </style>
</head>
<!-- SVG Liquid Glass filter (hidden) -->
<svg style="position:absolute;width:0;height:0;" aria-hidden="true">
  <defs>
    <filter id="liquid-glass" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.008"
        numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5"
        xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.4" result="blurred"/>
      <feComposite in="blurred" in2="SourceGraphic" operator="atop"/>
    </filter>
  </defs>
</svg>
<body>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner">

    </div>
  </div>

<div class="page">

  <!-- HERO -->
  <section class="hero">

</div>

<footer class="footer">
  <div class="footer-by">Por Monexus S.A.S. de C.V. · Marca registrada IMPI</div>

<script>
/* ═══════════════════════════════════════
   WALLPAPERS + PHOTO CREDITS
═══════════════════════════════════════ */
const WALLPAPERS = [
  'Wallpapers/Pedro Lastra_San Pedro Cholula_México.jpg',
  'Wallpapers/Oscar Reygo_Santa Fe_México.jpg',
  'Wallpapers/Bastien Nvs_Montmartre, París_Francia.jpg',
  'Wallpapers/Santa Barbara_Padar_Indonesia.jpg',
];

// Preload all images at startup
WALLPAPERS.forEach(src => { const img = new Image(); img.src = src; });

function parseCredit(filepath) {
  const base = filepath.split('/').pop().replace(/\.[^.]+$/, '');
  const parts = base.split('_');
  if (parts.length < 3) return null;
  const photographer = parts[0];
  const country      = parts[parts.length - 1];
  const region       = parts.slice(1, -1).join(', ');
  return { photographer, location: region + ', ' + country };
}

const creditEl = document.getElementById('photo-credit');

function renderCredit(credit) {
  creditEl.style.opacity = '0';
  setTimeout(() => {
    if (!credit) { creditEl.innerHTML = ''; return; }
    creditEl.innerHTML = `<b>${credit.photographer}</b> · ${credit.location}`;
    creditEl.style.opacity = '1';
  }, 200);
}

let wallIdx    = 0;
let activeEl   = document.getElementById('wall-a');
let inactiveEl = document.getElementById('wall-b');

function loadWallpaper(idx) {
  const src    = WALLPAPERS[idx];
  const credit = parseCredit(src);
  inactiveEl.style.backgroundImage = `url('${src}')`;
  setTimeout(() => {
    activeEl.classList.remove('active');
    inactiveEl.classList.add('active');
    renderCredit(credit);
    [activeEl, inactiveEl] = [inactiveEl, activeEl];
  }, 50);
}

// First load — immediate
loadWallpaper(0);

// Rotate every 5 seconds
setInterval(() => {
  wallIdx = (wallIdx + 1) % WALLPAPERS.length;
  loadWallpaper(wallIdx);
}, 5000);


/* ═══════════════════════════════════════
   TICKER — live prices
═══════════════════════════════════════ */
// Fallbacks con datos reales (se actualizan con fetchPrices)
let tickerState = [
  { label: 'USD/MXN',      val: '17.29',      chg: '+0.12%', up: true  },
  { label: 'BTC',          val: '$74,086',     chg: '-2.24%', up: false },
  { label: 'ETH',          val: '$2,011',      chg: '-3.06%', up: false },
  { label: 'XRP',          val: '$1.30',       chg: '-1.93%', up: false },
  { label: 'SOL',          val: '$82.00',      chg: '-1.89%', up: false },
  { label: 'ORO',          val: '$3,020',      chg: '+0.31%', up: true  },
  { label: 'WTI',          val: '$71.4',       chg: '-0.8%',  up: false },
  { label: 'CETES',        val: '9.50%',       chg: null,     up: true  },
  { label: 'INFLACIÓN MX', val: '3.77%',       chg: null,     up: false },
  { label: 'REAL YIELD',   val: '+5.73%',      chg: null,     up: true  },
  { label: 'REMESAS 2026', val: '$26.1B USD',  note: 'acum.', chg: null, up: true },
];

function fmtCrypto(n) {
  if (n >= 10000) return '$' + Math.round(n).toLocaleString('en-US');
  if (n >= 100)   return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1)     return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}
function fmtChg(c) {
  const up  = c >= 0;
  const str = (up ? '+' : '') + c.toFixed(2) + '%';
  return { str, up };
}

function renderTicker(items) {
  const doubled = [...items, ...items];
  const html = doubled.map(it => {
    let s = `<span class="ti"><span class="asset">${it.label}</span> <span class="val">${it.val}</span>`;
    if (it.chg) {
      const cls = it.up ? 'up' : 'dn';
      const arrow = it.up ? '▲' : '▼';
      s += ` <span class="chg ${cls}">${arrow} ${it.chg}</span>`;
    }
    if (it.note) s += ` <span class="note">${it.note}</span>`;
    s += `</span>`;
    return s;
  }).join('');
  const track = document.getElementById('ticker-track');
  track.innerHTML = html;
  track.style.animation = 'none';
  void track.offsetWidth;
  track.style.animation = '';
}

async function fetchPrices() {
  const [cgResult, fxResult] = await Promise.allSettled([
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple,solana&vs_currencies=usd&include_24hr_change=true&precision=4'),
    fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json')
  ]);

  if (cgResult.status === 'fulfilled' && cgResult.value.ok) {
    const cg = await cgResult.value.json();
    const map = { BTC: 'bitcoin', ETH: 'ethereum', XRP: 'ripple', SOL: 'solana' };
    tickerState = tickerState.map(it => {
      const id = map[it.label];
      if (!id || !cg[id]) return it;
      const { str, up } = fmtChg(cg[id].usd_24h_change);
      return { ...it, val: fmtCrypto(cg[id].usd), chg: str, up };
    });
  }

  if (fxResult.status === 'fulfilled' && fxResult.value.ok) {
    const fx = await fxResult.value.json();
    const mxn = fx?.usd?.mxn;
    if (mxn) {
      tickerState = tickerState.map(it =>
        it.label === 'USD/MXN' ? { ...it, val: mxn.toFixed(4) } : it
      );
    }
  }

  renderTicker(tickerState);
}

// Initial render with placeholders, then fetch live
renderTicker(tickerState);
fetchPrices();
setInterval(fetchPrices, 90000); // refresh every 90s

const TARGET = new Date('2026-06-08T09:00:00-06:00');
const START  = new Date('2026-05-27T00:00:00-06:00');

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now  = new Date();
  const diff = TARGET - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
    document.getElementById('launch-label').textContent = '¡Mundinero está en vivo!';
    return;
  }
  document.getElementById('cd-d').textContent = pad(Math.floor(diff / 86400000));
  document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
  document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000) / 60000));
  document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000) / 1000));
}
tick();
setInterval(tick, 1000);
