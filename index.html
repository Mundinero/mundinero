<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mundinero — Próximamente</title>
  <meta name="description" content="El futuro del dinero habla. Nosotros traducimos. Lanzamiento 8 de junio 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --tinta:     #1f1e1d;
      --crema:     #F7F6F3;
      --azul:      #6B87FF;
      --azul-vivo: #5170ff;
      --verde:     #34D87F;
      --rojo:      #FF6B6B;
      --serif:     'Newsreader', Georgia, serif;
      --sans:      'IBM Plex Sans', system-ui, sans-serif;
      --mono:      'IBM Plex Mono', ui-monospace, monospace;
    }

    html, body {
      height: 100%;
      background: var(--tinta);
      color: var(--crema);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    /* ── GRAIN ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
      z-index: 300;
    }

    /* ── WALLPAPER ── */
    .bg-wall {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .wall-slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center 50%;
      opacity: 0;
      transition: opacity 1.8s ease-in-out;
    }
    .wall-slide.active { opacity: 1; }
    .wall-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(31,30,29,0.72) 0%,
        rgba(31,30,29,0.42) 32%,
        rgba(31,30,29,0.48) 60%,
        rgba(31,30,29,0.85) 100%
      );
    }

    /* ── PHOTO CREDIT ── */
    .photo-credit {
      position: fixed;
      bottom: 52px;
      right: 16px;
      z-index: 40;
      text-align: right;
      font-size: 9px;
      color: rgba(247,246,243,0.32);
      font-family: var(--sans);
      line-height: 1.5;
      letter-spacing: 0.03em;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .photo-credit b { color: rgba(247,246,243,0.52); font-weight: 600; }

    /* ── TICKER ── */
    .ticker {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 32px;
      background: rgba(31,30,29,0.92);
      border-bottom: 1px solid rgba(247,246,243,0.07);
      overflow: hidden;
      display: flex;
      align-items: center;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .ticker-label {
      background: var(--azul-vivo);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      padding: 0 12px;
      height: 100%;
      display: flex;
      align-items: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .ticker-inner { overflow: hidden; flex: 1; }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: scroll-ticker 40s linear infinite;
    }
    .ti {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 0 22px;
      letter-spacing: 0.04em;
      color: rgba(247,246,243,0.5);
    }
    .ti .asset { color: rgba(247,246,243,0.5); }
    .ti .val   { color: var(--crema); font-weight: 600; font-family: var(--mono); }
    .ti .chg   { font-family: var(--mono); font-size: 10px; }
    .ti .up    { color: var(--verde); }
    .ti .dn    { color: var(--rojo); }
    .ti .note  { color: var(--verde); font-family: var(--mono); font-size: 10px; }
    @keyframes scroll-ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 32px;
      overflow: hidden;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px 40px 20px;
      min-height: 0;
    }

    /* ── CORNER TEXT ── always left/right, never stack ── */
    .hero-top {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      gap: 20px;
    }
    .tagline-left {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .tagline-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      text-align: right;
      flex-shrink: 0;
    }
    .tl {
      font-family: var(--sans);
      font-size: clamp(14px, 2vw, 28px);
      font-weight: 400;
      color: var(--crema);
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    /* ── LOGO ── */
    .logo-area {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 8px;
      flex-shrink: 0;
    }
    .logo-full {
      width: 100%;
      max-width: 1280px;
      height: auto;
      display: block;
    }

    /* ── BOTTOM ── */
    .bottom {
      padding: 0 24px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    /* Launch date */
    .launch-date {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.32);
    }

    /* ── COUNTDOWN ── */
    .countdown {
      display: flex;
      gap: 2px;
    }
    .cd-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 88px;
      padding: 14px 10px 10px;
      background: rgba(247,246,243,0.04);
      border: 0.5px solid rgba(247,246,243,0.08);
      backdrop-filter: blur(6px);
    }
    .cd-block:first-child { border-radius: 7px 0 0 7px; }
    .cd-block:last-child  { border-radius: 0 7px 7px 0; }
    .cd-num {
      font-family: var(--serif);
      font-size: clamp(36px, 4.5vw, 60px);
      font-weight: 700;
      line-height: 1;
      color: var(--crema);
      letter-spacing: -0.03em;
      transition: color 0.15s;
    }
    .cd-block:hover .cd-num { color: var(--azul); }
    .cd-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
      margin-top: 4px;
    }
    .cd-sep {
      display: flex;
      align-items: center;
      padding: 0 1px;
      padding-bottom: 18px;
      font-family: var(--serif);
      font-size: 26px;
      color: rgba(247,246,243,0.12);
    }

    /* ── PROGRESS ── */
    .progress-wrap { width: 100%; max-width: 400px; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.24);
      margin-bottom: 6px;
    }
    .progress-label span { color: var(--verde); }
    .progress-track {
      height: 2px;
      background: rgba(247,246,243,0.07);
      border-radius: 1px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--azul-vivo), var(--verde));
      border-radius: 1px;
      transition: width 1s ease;
    }

    /* ── NEWSLETTER ── */
    .newsletter { width: 100%; max-width: 400px; }
    .nl-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
      text-align: center;
      margin-bottom: 9px;
    }
    .nl-form {
      display: flex;
      border: 1px solid rgba(247,246,243,0.11);
      border-radius: 7px;
      overflow: hidden;
      background: rgba(247,246,243,0.04);
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }
    .nl-form:focus-within { border-color: rgba(107,135,255,0.5); }
    .nl-input {
      flex: 1;
      padding: 11px 14px;
      background: transparent;
      border: none;
      outline: none;
      color: var(--crema);
      font-family: var(--sans);
      font-size: 13px;
    }
    .nl-input::placeholder { color: rgba(247,246,243,0.22); }
    .nl-btn {
      padding: 11px 16px;
      background: var(--azul-vivo);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .nl-btn:hover { background: #3a57e8; }
    .nl-btn.done  { background: var(--verde); cursor: default; }
    .nl-note {
      font-size: 10px;
      color: rgba(247,246,243,0.18);
      text-align: center;
      margin-top: 7px;
      letter-spacing: 0.02em;
    }

    /* ── FOOTER ── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 11px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(247,246,243,0.05);
      background: rgba(31,30,29,0.88);
      backdrop-filter: blur(12px);
      z-index: 50;
    }
    .footer-by {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: rgba(247,246,243,0.28);
    }
    .footer-contact { display: flex; align-items: center; gap: 14px; }
    .footer-contact-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(247,246,243,0.28);
    }
    .footer-icon-link {
      display: flex;
      align-items: center;
      color: rgba(247,246,243,0.28);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-icon-link:hover { color: var(--azul); }

    /* ── MOBILE: zero scroll ── */
    @media (max-width: 700px) {
      .hero { padding: 16px 20px 12px; }
      .bottom { padding: 0 16px 56px; gap: 14px; }
      .tl { font-size: clamp(12px, 3.6vw, 18px); }
      .cd-block { min-width: 68px; padding: 10px 6px 8px; }
      .cd-num { font-size: clamp(28px, 7vw, 44px); }
      .cd-sep { font-size: 18px; }
      .footer { padding: 10px 16px; }
      .footer-by { font-size: 9px; }
    }
    @media (max-width: 400px) {
      .tl { font-size: 11px; }
    }
  </style>
</head>
<body>

<!-- WALLPAPER (2 slides for cross-fade) -->
<div class="bg-wall">
  <div class="wall-slide" id="wall-a"></div>
  <div class="wall-slide" id="wall-b"></div>
  <div class="wall-overlay"></div>
</div>

<!-- PHOTO CREDIT -->
<div class="photo-credit" id="photo-credit"></div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-label">En vivo</div>
  <div class="ticker-inner">
    <div class="ticker-track" id="ticker-track">
      <!-- Rendered by JS -->
    </div>
  </div>
</div>

<div class="page">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-top">
      <div class="tagline-left">
        <span class="tl">El futuro</span>

      </div>
      <div class="tagline-right">

      </div>
    </div>

    <div class="logo-area">
      <img class="logo-full" src="MundineroIso.png" alt="Mundinero">
    </div>
  </section>

  <!-- BOTTOM -->
  <div class="bottom">
    <p class="launch-date" id="launch-label">Lanzamiento · 8 de junio, 2026</p>

    <div class="countdown">
      <div class="cd-block"><span class="cd-num" id="cd-d">00</span><span class="cd-label">Días</span></div>
      <div class="cd-sep">·</div>
      <div class="cd-block"><span class="cd-num" id="cd-h">00</span><span class="cd-label">Horas</span></div>
      <div class="cd-sep">·</div>
      <div class="cd-block"><span class="cd-num" id="cd-m">00</span><span class="cd-label">Min</span></div>

        <input class="nl-input" type="email" placeholder="tu@correo.com" id="nl-email" autocomplete="email">
        <button class="nl-btn" id="nl-btn" onclick="subscribe()">Notificarme</button>

</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-by">Por Monexus S.A.S. de C.V. · Marca registrada IMPI</div>
  <div class="footer-contact">
    <span class="footer-contact-label">Contacto</span>
    <a class="footer-icon-link" href="https://instagram.com/mundinero" target="_blank" rel="noopener" aria-label="Instagram">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
      </svg>
    </a>
    <a class="footer-icon-link" href="mailto:azahed@monexus.mx" aria-label="Email">
      <svg width="17" height="14" viewBox="0 0 24 20" fill="none">
        <rect x="1" y="1" width="22" height="18" rx="3" stroke="currentColor" stroke-width="1.8"/>
        <path d="M1.5 4.5L12 12.5L22.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>
</footer>

<script>
/* ═══════════════════════════════════════
   WALLPAPERS + PHOTO CREDITS
═══════════════════════════════════════ */
const WALLPAPERS = [
  'Wallpapers/Pedro Lastra_San Pedro Cholula_México.jpg',
  'Wallpapers/Oscar Reygo_Santa Fe_México.jpg',
  'Wallpapers/Bastien Nvs_Montmartre, París_Francia.jpg',
  'Wallpapers/Santa Barbara_Padar_Indonesia.jpg',
  'Wallpapers/01-colinas.jpg',
];

function parseCredit(filepath) {
  const base = filepath.split('/').pop().replace(/\.[^.]+$/, '');
  const parts = base.split('_');
  if (parts.length < 3) return null;
  const photographer = parts[0];
  const country      = parts[parts.length - 1];
  const region       = parts.slice(1, -1).join(', ');
  return { photographer, location: region + ', ' + country };
}

function renderCredit(credit) {
  const el = document.getElementById('photo-credit');
  if (!credit) { el.innerHTML = ''; return; }
  el.innerHTML = `<b>${credit.photographer}</b><br>${credit.location}`;
}

let wallIdx  = 0;
let activeEl = document.getElementById('wall-a');
let inactiveEl = document.getElementById('wall-b');

function loadWallpaper(idx) {
  const src    = WALLPAPERS[idx];
  const credit = parseCredit(src);
  inactiveEl.style.backgroundImage = `url('${src}')`;
  // trigger cross-fade
  setTimeout(() => {
    activeEl.classList.remove('active');
    inactiveEl.classList.add('active');
    renderCredit(credit);
    [activeEl, inactiveEl] = [inactiveEl, activeEl];
  }, 50);
}

// First load — immediate
loadWallpaper(0);

// Rotate every 8 seconds
setInterval(() => {
  wallIdx = (wallIdx + 1) % WALLPAPERS.length;
  loadWallpaper(wallIdx);
}, 8000);


/* ═══════════════════════════════════════
   TICKER — live prices
═══════════════════════════════════════ */
// Static fallbacks (updated when live data arrives)
let tickerState = [
  { label: 'USD/MXN', val: '—',       chg: null,      up: null },
  { label: 'BTC',     val: '—',       chg: null,      up: null },
  { label: 'ETH',     val: '—',       chg: null,      up: null },
  { label: 'XRP',     val: '—',       chg: null,      up: null },
  { label: 'SOL',     val: '—',       chg: null,      up: null },
  { label: 'ORO',     val: '$3,020',  chg: '+0.31%',  up: true  },
  { label: 'WTI',     val: '$71.4',   chg: '−0.8%',   up: false },
  { label: 'CETES',   val: '9.50%',   chg: null,      up: null  },
  { label: 'INFLACIÓN MX', val: '3.77%', chg: null,   up: null  },
  { label: 'REAL YIELD',   val: '+5.73%', chg: null,  up: true  },
  { label: 'REMESAS 2026', val: '$26.1B USD', note: 'acum.', chg: null, up: null },
];

function fmtCrypto(n) {
  if (n >= 10000) return '$' + Math.round(n).toLocaleString('en-US');
  if (n >= 100)   return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
  if (n >= 1)     return '$' + n.toFixed(2);
  return '$' + n.toFixed(4);
}
function fmtChg(c) {
  const up  = c >= 0;
  const str = (up ? '+' : '') + c.toFixed(2) + '%';
  return { str, up };
}

function renderTicker(items) {
  const doubled = [...items, ...items];
  const html = doubled.map(it => {
    let s = `<span class="ti"><span class="asset">${it.label}</span> <span class="val">${it.val}</span>`;
    if (it.chg) {
      const cls = it.up ? 'up' : 'dn';
      const arrow = it.up ? '▲' : '▼';
      s += ` <span class="chg ${cls}">${arrow} ${it.chg}</span>`;
    }
    if (it.note) s += ` <span class="note">${it.note}</span>`;
    s += `</span>`;
    return s;
  }).join('');
  const track = document.getElementById('ticker-track');
  track.innerHTML = html;
  track.style.animation = 'none';
  void track.offsetWidth;
  track.style.animation = '';
}

async function fetchPrices() {
  const [cgResult, fxResult] = await Promise.allSettled([
    fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,ripple,solana&vs_currencies=usd&include_24hr_change=true&precision=4'),
    fetch('https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json')
  ]);

  if (cgResult.status === 'fulfilled' && cgResult.value.ok) {
    const cg = await cgResult.value.json();
    const map = { BTC: 'bitcoin', ETH: 'ethereum', XRP: 'ripple', SOL: 'solana' };
    tickerState = tickerState.map(it => {
      const id = map[it.label];
      if (!id || !cg[id]) return it;
      const { str, up } = fmtChg(cg[id].usd_24h_change);
      return { ...it, val: fmtCrypto(cg[id].usd), chg: str, up };
    });
  }

  if (fxResult.status === 'fulfilled' && fxResult.value.ok) {
    const fx = await fxResult.value.json();
    const mxn = fx?.usd?.mxn;
    if (mxn) {
      tickerState = tickerState.map(it =>
        it.label === 'USD/MXN' ? { ...it, val: mxn.toFixed(4) } : it
      );
    }
  }

  renderTicker(tickerState);
}

// Initial render with placeholders, then fetch live
renderTicker(tickerState);
fetchPrices();
setInterval(fetchPrices, 90000); // refresh every 90s


/* ═══════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════ */
const TARGET = new Date('2026-06-08T09:00:00-06:00');
const START  = new Date('2026-05-27T00:00:00-06:00');

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const now  = new Date();
  const diff = TARGET - now;
  if (diff <= 0) {
    ['cd-d','cd-h','cd-m','cd-s'].forEach(id => document.getElementById(id).textContent = '00');
    document.getElementById('launch-label').textContent = '¡Mundinero está en vivo!';
    document.getElementById('pct').textContent = '100%';
    document.getElementById('prog-fill').style.width = '100%';
    return;
  }
  document.getElementById('cd-d').textContent = pad(Math.floor(diff / 86400000));
  document.getElementById('cd-h').textContent = pad(Math.floor((diff % 86400000) / 3600000));
  document.getElementById('cd-m').textContent = pad(Math.floor((diff % 3600000) / 60000));
  document.getElementById('cd-s').textContent = pad(Math.floor((diff % 60000) / 1000));
  const pct = Math.min(100, Math.max(0, Math.round(((now - START) / (TARGET - START)) * 100)));
  document.getElementById('pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}
tick();
setInterval(tick, 1000);


/* ═══════════════════════════════════════
   NEWSLETTER
═══════════════════════════════════════ */
function subscribe() {
  const email = document.getElementById('nl-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('nl-email').style.borderLeft = '2px solid var(--rojo)';
    document.getElementById('nl-email').placeholder = 'Ingresa un correo válido';
    return;
  }
  const btn = document.getElementById('nl-btn');
  btn.textContent = '¡Listo!';
  btn.classList.add('done');
  document.getElementById('nl-email').disabled = true;
  document.getElementById('nl-note').textContent = 'Te avisamos el 8 de junio. ¡Gracias!';
  document.getElementById('nl-note').style.color = 'rgba(52,216,127,0.65)';
}
document.getElementById('nl-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') subscribe();
});
</script>
